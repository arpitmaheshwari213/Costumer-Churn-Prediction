scoring_func: "macro_f1" 
# Default Values
default_params:
    learning_rate: 0.1
    max_depth: 6
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 1.0
    reg_lambda: 2.0
    objective: "binary:logistic"
    eval_metric: "logloss"

# Search Space for hyperparameters
parameter_search_space: 
    objective:
        type: categorical
        values: ["binary:logistic"]
    eval_metric:
        type: categorical
        values: ["logloss"] 

    learning_rate:
        type: float
        min: 0.01
        max: 0.3
        log_scale: true
        
    max_depth:
        type: int
        min: 4
        max: 10

    min_child_weight:
        type: int
        min: 3
        max: 8

    subsample:
        type: float
        min: 0.7
        max: 1.0
        
    colsample_bytree:
        type: float
        min: 0.7
        max: 1.0
        
    reg_alpha:
        type: float
        min: 1e-8
        max: 3.0
        log_scale: true

    reg_lambda:
        type: float
        min: 1
        max: 3.0
        log_scale: true


optional_tuning_params:
    n_study_trails: 30
    n_cv_splits: 5
    seed: 30
    max_n_estimators: 300




